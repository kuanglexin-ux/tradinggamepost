<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合成大炸鸡桶 - 完美概率平衡版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f7edd6;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #score-board {
            font-size: 24px;
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 15px;
            user-select: none;
        }
        #game-area {
            position: relative;
            border: 4px solid #8B4513;
            border-radius: 10px;
            background: #fffef9;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            touch-action: none; 
        }
        #tip {
            margin-top: 10px;
            color: #a0522d;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="score-board">积分: <span id="score">0</span></div>
    <div id="game-area"></div>
    <div id="tip">💡 在屏幕上左右滑动控制方向</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

const width = 360;  
const height = 540;
let score = 0;

// 1. 初始化引擎
const engine = Engine.create();
const world = engine.world;
const render = Render.create({
    element: document.getElementById('game-area'),
    engine: engine,
    options: { 
        width, 
        height, 
        wireframes: false, 
        background: '#fffef9' 
    }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// 2. 创建边界
const ground = Bodies.rectangle(width/2, height + 20, width, 60, { isStatic: true, render: { fillStyle: '#8B4513' } });
const leftWall = Bodies.rectangle(-20, height/2, 50, height, { isStatic: true });
const rightWall = Bodies.rectangle(width + 20, height/2, 50, height, { isStatic: true });
Composite.add(world, [ground, leftWall, rightWall]);

// 3. 素材基本属性配置（已完整保留你微调后的所有图片缩放参数）
const TYPES = {
    WING: { 
        label: 'wing', radius: 27.7, 
        render: { fillStyle: '#f39c12', sprite: { texture: 'assets/wing.png', xScale: 0.38, yScale: 0.38 } } 
    },
    SPICE: { 
        label: 'spice', radius: 17.1, 
        render: { fillStyle: '#e74c3c', sprite: { texture: 'assets/spice.png', xScale: 0.2, yScale: 0.181 } } 
    },
    ROASTED: { 
        label: 'roasted', radius: 32.7, 
        render: { fillStyle: '#d35400', sprite: { texture: 'assets/roasted_wing.png', xScale: 0.122, yScale: 0.109 } } 
    },
    YELLOW_WING: {
        label: 'yellow_wing', radius: 27.7, 
        render: { fillStyle: '#f1c40f', sprite: { texture: 'assets/yellow_wing.png', xScale: 0.18, yScale: 0.18 } }
    },
    RED_SPICE: {
        label: 'red_spice', radius: 17.1, 
        render: { fillStyle: '#c0392b', sprite: { texture: 'assets/red_spice.png', xScale: 0.135, yScale: 0.121 } }
    },
    RED_ROASTED: {
        label: 'red_roasted', radius: 32.7, 
        render: { fillStyle: '#962d22', sprite: { texture: 'assets/red_roasted_wing.png', xScale: 0.42, yScale: 0.38 } }
    },
    EMPTY: { 
        label: 'empty', radius: 30, 
        render: { fillStyle: '#95a5a6', sprite: { texture: 'assets/empty_bucket.png', xScale: 0.35, yScale: 0.35 } } 
    },
    FANCY: { 
        label: 'fancy', radius: 40, 
        render: { fillStyle: '#2ecc71', sprite: { texture: 'assets/fancy_bucket.png', xScale: 0.3, yScale: 0.3 } } 
    }
};

// 🎯 核心改动：已根据最新需求重新分配权重（总权重 100）
// EMPTY 进一步降低至 12.75%，SPICE 降低至 17.00%，其余三种素材平分剩余概率（各约 23.42%）
const spawnablePool = [
    { type: TYPES.WING,        weight: 23.416 },
    { type: TYPES.YELLOW_WING, weight: 23.416 },
    { type: TYPES.RED_SPICE,   weight: 23.416 },
    { type: TYPES.SPICE,       weight: 17.000 }, // 🎯 已降低 20%
    { type: TYPES.EMPTY,       weight: 12.750 }  // 🎯 已再降低 15%
];

let currentBody = null;
let targetX = width / 2; 
const fallSpeed = 4.6;   // 保持你调整后的高流速

// 4. 生成新素材（基于新权重区间）
function spawnNext() {
    let randomNum = Math.random() * 100;
    let currentType = spawnablePool[0].type; 
    
    let sum = 0;
    for (let i = 0; i < spawnablePool.length; i++) {
        sum += spawnablePool[i].weight;
        if (randomNum <= sum) {
            currentType = spawnablePool[i].type;
            break;
        }
    }

    targetX = width / 2; 
    currentBody = Bodies.circle(targetX, 40, currentType.radius, {
        label: currentType.label,
        render: currentType.render,
        restitution: 0.2,
        friction: 0.1
    });
    
    Composite.add(world, currentBody);
}

// 5. 让素材在玩家手中时缓慢自动下落
Events.on(engine, 'beforeUpdate', () => {
    if (currentBody) {
        let nextX = currentBody.position.x + (targetX - currentBody.position.x) * 0.2;
        let nextY = currentBody.position.y + fallSpeed;
        
        const radius = currentBody.circleRadius;
        nextX = Math.max(radius, Math.min(width - radius, nextX));

        Body.setPosition(currentBody, { x: nextX, y: nextY });
        Body.setVelocity(currentBody, { x: 0, y: 0 });
    }
});

// 6. 触控与鼠标事件绑定
const gameArea = document.getElementById('game-area');

function handleMove(clientX) {
    const rect = gameArea.getBoundingClientRect();
    const relativeX = clientX - rect.left;
    targetX = relativeX;
}

gameArea.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
        handleMove(e.touches[0].clientX);
    }
}, { passive: true });

gameArea.addEventListener('mousemove', (e) => {
    if (e.buttons === 1 || currentBody) { 
        handleMove(e.clientX);
    }
});

// 7. 碰撞与合成逻辑
Events.on(engine, 'collisionStart', (event) => {
    const pairs = event.pairs;
    
    pairs.forEach((pair) => {
        const bodyA = pair.bodyA;
        const bodyB = pair.bodyB;
        
        if (currentBody && (bodyA === currentBody || bodyB === currentBody)) {
            const otherBody = bodyA === currentBody ? bodyB : bodyA;
            if (otherBody !== leftWall && otherBody !== rightWall) {
                currentBody = null; 
                setTimeout(spawnNext, 800); 
            }
        }

        const labelA = bodyA.label;
        const labelB = bodyB.label;
        let midX = (bodyA.position.x + bodyB.position.x) / 2;
        let midY = (bodyA.position.y + bodyB.position.y) / 2;

        // 路线 1（经典线）
        if ((labelA === 'wing' && labelB === 'spice') || (labelA === 'spice' && labelB === 'wing')) {
            Composite.remove(world, [bodyA, bodyB]);
            createSynthesizedBody(midX, midY, TYPES.ROASTED);
        }
        
        // 路线 2 (黄红双配对线)
        if ((labelA === 'yellow_wing' && labelB === 'red_spice') || (labelA === 'red_spice' && labelB === 'yellow_wing')) {
            Composite.remove(world, [bodyA, bodyB]);
            createSynthesizedBody(midX, midY, TYPES.RED_ROASTED);
        }
        
        // 消除 1（经典线入桶）
        if ((labelA === 'roasted' && labelB === 'empty') || (labelA === 'empty' && labelB === 'roasted')) {
            Composite.remove(world, [bodyA, bodyB]);
            let fancy = createSynthesizedBody(midX, midY, TYPES.FANCY);
            setTimeout(() => {
                Composite.remove(world, fancy);
                score += 100;
                document.getElementById('score').innerText = score;
            }, 150);
        }

        // 消除 2（新路线入桶）
        if ((labelA === 'red_roasted' && labelB === 'empty') || (labelA === 'empty' && labelB === 'red_roasted')) {
            Composite.remove(world, [bodyA, bodyB]);
            let fancy = createSynthesizedBody(midX, midY, TYPES.FANCY);
            setTimeout(() => {
                Composite.remove(world, fancy);
                score += 100;
                document.getElementById('score').innerText = score;
            }, 150);
        }
    });
});

function createSynthesizedBody(x, y, type) {
    const newBody = Bodies.circle(x, y, type.radius, {
        label: type.label,
        render: type.render,
        restitution: 0.3
    });
    Composite.add(world, newBody);
    return newBody;
}

spawnNext();
</script>
</body>
</html>
